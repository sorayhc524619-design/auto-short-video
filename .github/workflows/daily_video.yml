name: Daily BGM Video Generation

on:
  schedule:
    # 毎日 UTC 02:00 (JST 11:00) に実行
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      duration_sec:
        description: 'Video length in seconds (e.g. 600=10min, 10800=3h, 28800=8h)'
        required: false
        default: '10800'
      dry_run:
        description: 'Dry run (skip upload)'
        type: boolean
        required: false
        default: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 8h動画はffmpegで時間がかかる

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SUNO_API_KEY: ${{ secrets.SUNO_API_KEY }}
          SUNO_API_BASE_URL: ${{ secrets.SUNO_API_BASE_URL }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          VIDEO_DURATION_SEC: ${{ github.event.inputs.duration_sec || '10800' }}
          LOG_LEVEL: INFO
          FONT_PATH: '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf'
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bgm-video-${{ github.run_number }}
          path: |
            output/final_*.mp4
            logs/result_*.json
          retention-days: 7

      - name: Notify failure
        if: failure()
        run: |
          echo "Pipeline failed. Check logs."
          echo "Run ID: ${{ github.run_id }}"
