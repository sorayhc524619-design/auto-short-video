name: 毎日ショート動画自動生成・投稿

on:
  schedule:
    # 毎朝 JST 9:00 に実行（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手動実行も可能（GitHub Actions画面から）
    inputs:
      genre:
        description: 'コンテンツジャンル（空白でデフォルト使用）'
        required: false
        default: ''
      dry_run:
        description: 'ドライラン（投稿せずに動画のみ生成）'
        type: boolean
        required: false
        default: false

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ===== 1. リポジトリのチェックアウト =====
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ===== 2. Python セットアップ =====
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ===== 3. システム依存ライブラリのインストール =====
      - name: FFmpeg と日本語フォントをインストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            libsndfile1

      # ===== 4. Python ライブラリのインストール =====
      - name: Python ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ===== 5. パイプラインの実行 =====
      - name: ショート動画生成・投稿パイプライン実行
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          KLING_API_KEY: ${{ secrets.KLING_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          CONTENT_GENRE: ${{ github.event.inputs.genre || '雑学・豆知識' }}
          FONT_PATH: '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc'
          LOG_LEVEL: 'INFO'
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --genre "$CONTENT_GENRE" --dry-run
          else
            python main.py --genre "$CONTENT_GENRE"
          fi

      # ===== 6. 生成ファイルのアップロード（アーティファクト保存） =====
      - name: 生成ファイルをアーティファクトとして保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-output-${{ github.run_number }}
          path: |
            output/final_*.mp4
            logs/result_*.json
          retention-days: 7

      # ===== 7. 失敗通知（任意） =====
      - name: 失敗時の通知
        if: failure()
        run: |
          echo "❌ パイプラインが失敗しました。ログを確認してください。"
          echo "Run ID: ${{ github.run_id }}"
